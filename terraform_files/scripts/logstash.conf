# ==============================================================================
# HOSPITAL HONEYPOT: LOGSTASH PIPELINE
# Listens for Filebeat and Winlogbeat traffic from the Clinical Zone
# and forwards it to the Elasticsearch database.
# ==============================================================================

input {
  beats {
    # This matches the exposed port in your docker-compose.yml
    port => 5044
  }
}

filter {
  # For this initial validation, we are passing the raw logs directly through.
  # Advanced parsing (like pulling specific Modbus or DICOM fields) can be added here later.
}

output {
  elasticsearch {
    # Points to the Elasticsearch container on the internal Docker bridge network
    hosts => ["http://elasticsearch:9200"]
    
    # This ensures Filebeat and Winlogbeat logs are stored in organized, daily indices
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
  }
  
  # Prints output to the Logstash container console for easy debugging
  stdout { codec => rubydebug }
}